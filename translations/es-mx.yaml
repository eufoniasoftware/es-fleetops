activity:
  form:
    code: Código
    code-help-text: Ingrese un identificador único específico para esta actividad.
    completes-order: Completa la orden
    details: Detalles
    details-help-text: Proporcione una descripción detallada de la actividad para el entendimiento del usuario final.
    key: Clave
    key-help-text: '"Ingrese una clave utilizada para la toma de decisiones programáticas. Esta clave puede representar una o varias actividades con el mismo identificador. Nota: No es necesario que esta clave sea única."'
    pod-method-placeholder: Seleccionar método de prueba de entrega
    require-pod: Requiere prueba de entrega
    require-pod-help-text: Esta actividad requiere que se cree una prueba antes de que pueda aplicarse a la orden.
    select-pod-method: Método de prueba de entrega
    status: Estado
    status-help-text: Especifique el estado que se muestra al usuario final cuando se activa esta actividad.
    logic-builder:
      activity-logic: Lógica de actividad
      activity-logic-help-text: Defina las condiciones lógicas personalizadas que determinan cuándo una actividad está disponible en el flujo de trabajo. Esta función le permite adaptar el flujo según criterios específicos, asegurando que cada actividad se active solo cuando se cumplan sus condiciones predefinidas.
      activity-logic-add-logic-help-text: Cree un nuevo conjunto de condiciones que definirán cuándo debe activarse una actividad. Haga clic en esto para comenzar a crear una nueva regla lógica.
      activity-logic-select-logic-type-help-text: Elija el tipo de lógica que seguirá esta condición. Seleccione 'If' para una condición directa, 'And'/'Or' para condiciones compuestas, o 'Not' para negar una condición.
      activity-logic-add-condition-help-text: Agregue un requisito específico que deba cumplirse dentro de este conjunto lógico. Use esto para especificar criterios adicionales que controlen la disponibilidad de la actividad.
      field: Campo
      value: Valor
      add-logic: Agregar lógica
      add-condition: Agregar condición
      no-activity-logic: Sin lógica de actividad
      add-logic-help-text: Agregue su primera lógica de actividad para crear decisiones de actividad calculadas
      types:
        and: >-
          AND Lógico: Verdadero si todas las condiciones son verdaderas
        or: >-
          OR Lógico: Verdadero si al menos una condición es verdadera
        not: >-
          NOT Lógico: Invierte el valor de verdad de la condición
        if: >-
          Lógica condicional: Ejecuta la siguiente acción si la condición es verdadera
      operators:
        equal: Verifica si dos valores son iguales
        not-equal: Verifica si dos valores no son iguales
        greater-than: Verifica si un valor es mayor que otro
        less-than: Verifica si un valor es menor que otro
        greater-than-or-equal: Verifica si un valor es mayor o igual que otro
        less-than-or-equal: Verifica si un valor es menor o igual que otro
        exists: Verifica si un campo o valor existe
        has: Verifica si un objeto tiene una propiedad específica o si una colección contiene un elemento específico
        contains: Verifica si una cadena contiene otra cadena, o si un arreglo incluye un elemento específico
        begins-with: Verifica si una cadena comienza con una subcadena especificada
        ends-with: Verifica si una cadena termina con una subcadena especificada
        in: Verifica si un valor está dentro de un conjunto o rango dado
        not-in: Verifica si un valor no está dentro de un conjunto o rango dado
        and: AND Lógico, verdadero si ambos operandos son verdaderos
        or: OR Lógico, verdadero si al menos un operando es verdadero
        not: NOT Lógico, invierte el valor de verdad
    event-selector:
      activity-events: Eventos de actividad
      activity-events-select-to-fire: Seleccione qué eventos se activarán cuando ocurra esta actividad.
      activity-events-select-events-info: Seleccione el evento específico que desea activar en respuesta a esta actividad.
      select-event-to-add: Seleccionar evento para agregar...
      no-activity-events: Sin eventos de actividad
      select-events-help-text: Seleccione y agregue eventos para activar una vez que se alcance la actividad
      events:
        order:
          dispatched: Se activa cuando una orden se despacha con éxito.
          failed: Se activa cuando una orden falla debido a un error o excepción.
          canceled: Se activa cuando una orden es cancelada por un usuario, conductor o proceso del sistema.
          completed: Se activa cuando una orden es completada por un conductor o proceso del sistema.

